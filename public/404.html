<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>JewelPetal — Jewelry Gift Bouquets, Made in India</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // Copyright (c) 2016 Rafael Pedicini, licensed under the MIT License
      // ----------------------------------------------------------------------
      // This script takes the current url and converts the path and query
      // string into just a query string, then redirects to the index.html page
      // where the query string will be parsed and the correct route resolved.
      //
      // If hosting on a custom domain (e.g. jewelpetal.in), pathSegmentsToKeep is 0.
      // If hosting on a github.io subdomain (e.g. username.github.io/repo-name),
      // pathSegmentsToKeep is 1 (to keep the repo-name in the path).
      var pathSegmentsToKeep = window.location.hostname.indexOf('github.io') !== -1 ? 1 : 0;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
        '/?p=' + l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
