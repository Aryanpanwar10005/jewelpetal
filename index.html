    <!-- Start Single Page Apps for GitHub Pages Routing Fallback -->
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // Copyright (c) 2016 Rafael Pedicini, licensed under the MIT License
      // ----------------------------------------------------------------------
      // This script checks to see if a redirect is present in the query string,
      // converts it back into the correct url and adds it to the browser's history
      // using window.history.replaceState() without causing a physical page reload.
      (function(l) {
        if (l.search[1] === 'p' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).reduce(function(r, q) {
            var p = q.split('=');
            r[p[0]] = p[1];
            return r;
          }, {});
          if (decoded.p !== undefined) {
            window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + (decoded.p || '') +
              (decoded.q ? ('?' + decoded.q) : '') +
              l.hash
            );
          }
        }
      }(window.location));
    </script>
    <!-- End Single Page Apps for GitHub Pages Routing Fallback -->
